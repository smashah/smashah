name: Waka Readme

on:
  schedule:
    # Runs once a day at 12am UTC.
    - cron: "0 0 * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: waka-readme
  cancel-in-progress: true

jobs:
  timeout-guard:
    name: Stop run after 10 seconds
    runs-on: ubuntu-latest
    steps:
      - name: Cancel if Waka update is still running
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 10
          update_status=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" --jq '.jobs[] | select(.name == "Update this repo'"'"'s README") | .status')
          if printf '%s\n' "${update_status}" | grep -qx completed; then
            exit 0
          fi
          gh run cancel "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}"

  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          SHOW_TITLE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
